name: Deploy

on:
  push:
    tags: ["*"]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.1)'
        required: true
        default: 'latest'

env:
  GAR_REGISTRY: us-central1-docker.pkg.dev
  GAR_IMAGE: us-central1-docker.pkg.dev/sylvan-triumph-161508/web/web
  DEPLOY_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  CLOUD_RUN_SERVICE: web
  CLOUD_RUN_REGION: us-central1
  GCP_PROJECT_ID: sylvan-triumph-161508

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Authenticate to Google Cloud
        id: auth
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name != 'pull_request'
        run: gcloud auth configure-docker ${{ env.GAR_REGISTRY }} --quiet

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GAR_IMAGE }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        if: github.event_name != 'pull_request'
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.CLOUD_RUN_REGION }}
          image: ${{ env.GAR_IMAGE }}:${{ env.DEPLOY_TAG }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=256Mi
            --min-instances=0
            --max-instances=2
