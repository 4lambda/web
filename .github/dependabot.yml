---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      commitlint:
        patterns:
          - "commitlint*"

  - package-ecosystem: "docker"
    directories:
      - "/apps/api"
      - "/apps/dashboard"
      - "/apps/indexer"
    schedule:
      interval: "daily"
    groups:
